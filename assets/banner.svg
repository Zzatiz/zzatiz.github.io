<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="450" y1="0" x2="450" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="750" y1="0" x2="750" y2="240"/>
    <line x1="900" y1="0" x2="900" y2="240"/>
    <line x1="1050" y1="0" x2="1050" y2="240"/>
  </g>

  <!-- Center glow blob -->
  <ellipse cx="600" cy="120" rx="400" ry="80" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" rx="1" opacity="0.8"/>

  <!-- Bottom accent line -->
  <rect x="0" y="238" width="1200" height="2" fill="url(#accentGrad)" rx="1" opacity="0.8"/>

  <!-- Decorative dots - left cluster -->
  <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.5"/>
  <circle cx="100" cy="40" r="1.5" fill="#bc8cff" opacity="0.4"/>
  <circle cx="60" cy="80" r="1" fill="#58a6ff" opacity="0.3"/>
  <circle cx="120" cy="75" r="2.5" fill="#58a6ff" opacity="0.2"/>
  <circle cx="45" cy="50" r="1.5" fill="#bc8cff" opacity="0.3"/>

  <!-- Decorative dots - right cluster -->
  <circle cx="1120" cy="60" r="2" fill="#bc8cff" opacity="0.5"/>
  <circle cx="1100" cy="40" r="1.5" fill="#58a6ff" opacity="0.4"/>
  <circle cx="1140" cy="80" r="1" fill="#bc8cff" opacity="0.3"/>
  <circle cx="1080" cy="75" r="2.5" fill="#bc8cff" opacity="0.2"/>
  <circle cx="1155" cy="50" r="1.5" fill="#58a6ff" opacity="0.3"/>

  <!-- Decorative dots - bottom corners -->
  <circle cx="80" cy="180" r="2" fill="#58a6ff" opacity="0.3"/>
  <circle cx="100" cy="200" r="1.5" fill="#bc8cff" opacity="0.2"/>
  <circle cx="1120" cy="180" r="2" fill="#bc8cff" opacity="0.3"/>
  <circle cx="1100" cy="200" r="1.5" fill="#58a6ff" opacity="0.2"/>

  <!-- Avatar / Logo mark -->
  <g transform="translate(490, 90)" filter="url(#glow)">
    <!-- Hexagon shape -->
    <polygon points="55,0 110,30 110,90 55,120 0,90 0,30"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <polygon points="55,15 95,37.5 95,82.5 55,105 15,82.5 15,37.5"
             fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>
    <!-- Z letter mark -->
    <text x="55" y="72" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="44" font-weight="700" fill="url(#accentGrad)"
          text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">Z</text>
  </g>

  <!-- Main title -->
  <text x="660" y="100" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="42" font-weight="700" fill="#e6edf3"
        text-anchor="start" dominant-baseline="middle" letter-spacing="-0.5">zzatiz</text>

  <!-- Subtitle / domain -->
  <text x="661" y="138" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="400" fill="#8b949e"
        text-anchor="start" dominant-baseline="middle" letter-spacing="0.5">zzatiz.github.io</text>

  <!-- Tag line -->
  <text x="661" y="165" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
        font-size="13" font-weight="400" fill="url(#accentGrad)"
        text-anchor="start" dominant-baseline="middle" opacity="0.9">Personal site &amp; portfolio</text>

  <!-- Divider line between logo and text -->
  <line x1="645" y1="85" x2="645" y2="175" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Bottom decorative bar -->
  <rect x="490" y="220" width="220" height="1" fill="url(#accentGrad)" opacity="0.2" rx="1"/>
</svg>
